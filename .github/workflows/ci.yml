name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: RSpec
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up environment
        run: |
          cp .env.example .env
          sed -i "s/^CURRENT_UID=.*/CURRENT_UID=$(id -u)/" .env
          sed -i "s/^CURRENT_GID=.*/CURRENT_GID=$(id -g)/" .env

      - name: Build images
        run: make build

      - name: Set up database
        run: make db.init.test

      - name: Run RSpec
        run: make test

  rubocop:
    name: RuboCop
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: make build

      - name: Run RuboCop
        run: make rubocop

  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: make build.frontend

      - name: Run ESLint
        run: make lint.frontend

  frontend-test:
    name: Vitest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: make build.frontend

      - name: Run Vitest
        run: make test.frontend

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: make build.frontend

      - name: Validate build
        run: make frontend.build

  audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: make build.frontend

      - name: Audit production dependencies
        run: make audit.frontend
